<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor de Videos Profesional</title>
  <style>
    body {
      background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
      color: #232a36;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
      display: flex;
      flex-direction: column;
    }
    body.night {
      background: linear-gradient(120deg, #181c24 0%, #232a36 100%);
      color: #fff;
    }
    .main-header {
      width: 100vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 5vw 0 5vw;
      box-sizing: border-box;
      background: transparent;
    }
    .logo-title {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .logo {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      box-shadow: 0 2px 8px #00b4d822;
      background: #fff;
      object-fit: cover;
      border: 2px solid #00b4d8;
      transition: border 0.3s;
      display: none;
    }
    h1 {
      font-size: 2.3rem;
      letter-spacing: 1px;
      color: #00b4d8;
      text-shadow: 0 2px 12px #fff8;
      margin: 0;
      transition: color 0.4s, text-shadow 0.4s;
    }
    body.night h1 {
      color: #48cae4;
      text-shadow: 0 2px 12px #232a36cc;
    }
    .theme-btn {
      background: linear-gradient(90deg, #00b4d8 60%, #48cae4 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0;
      font-size: 1.8rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px #00b4d822;
      transition: background 0.2s, transform 0.2s;
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 56px;
      outline: none;
      border: none;
    }
    .theme-btn:focus {
      outline: 2.5px solid #48cae4;
    }
    .theme-btn:hover {
      background: linear-gradient(90deg, #0096c7 60%, #00b4d8 100%);
      transform: translateY(-2px) scale(1.08);
    }
    .theme-icon {
      font-size: 2.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
    }
    .video-container {
      margin: 32px auto 0 auto;
      background: rgba(255,255,255,0.97);
      border-radius: 32px;
      box-shadow: 0 8px 32px #00b4d822, 0 1.5px 8px #48cae488;
      padding: 48px 36px 36px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 98vw;
      max-width: 1300px;
      min-height: 60vh;
      animation: fadeInUp 1.2s;
      transition: background 0.4s, box-shadow 0.4s;
    }
    body.night .video-container {
      background: rgba(35,42,54,0.98);
      box-shadow: 0 8px 32px #000a, 0 1.5px 8px #00b4d822;
    }
    .controls {
      margin-bottom: 28px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .file-label {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }
    .file-label input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 2;
    }
    .file-custom {
      display: inline-block;
      background: linear-gradient(90deg, #00b4d8 60%, #48cae4 100%);
      color: #fff;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 1.18rem;
      font-weight: 600;
      box-shadow: 0 2px 8px #00b4d822;
      border: none;
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
      letter-spacing: 0.5px;
      z-index: 1;
      position: relative;
    }
    .file-label:hover .file-custom {
      background: linear-gradient(90deg, #0096c7 60%, #00b4d8 100%);
      transform: translateY(-2px) scale(1.04);
    }
    video {
      width: 100%;
      max-width: 1200px;
      min-height: 340px;
      border-radius: 20px;
      background: #e0eafc;
      margin-top: 18px;
      box-shadow: 0 2px 16px #00b4d822;
      border: 2.5px solid #00b4d8;
      outline: 4px solid #f1faff;
      transition: box-shadow 0.2s, border 0.2s, background 0.4s;
    }
    body.night video {
      background: #181c24;
      border: 2.5px solid #48cae4;
      outline: 4px solid #232a36;
    }
    .error {
      color: #ff5252;
      margin-top: 14px;
      min-height: 24px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .autoplay-msg {
      margin-top: 18px;
      color: #0096c7;
      background: #e0f7fa;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1.08rem;
      font-weight: 500;
      box-shadow: 0 2px 8px #00b4d822;
      text-align: center;
      animation: fadeInMsg 1s;
    }
    @keyframes fadeInMsg {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 900px) {
      .video-container, video {
        max-width: 98vw;
        min-width: 0;
      }
      .main-header, .main-footer {
        padding-left: 2vw;
        padding-right: 2vw;
      }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="logo-title">
      <h1>Reproductor de Videos Profesional</h1>
    </div>
    <button id="toggleThemeBtn" class="theme-btn" title="Cambiar tema">
      <span class="theme-icon">🌙</span>
    </button>
  </header>
  <main>
    <div class="video-container">
      <div class="controls">
        <label class="file-label">
          <input type="file" id="fileInput" accept="video/*">
          <span class="file-custom">📁 Elegir video</span>
        </label>
      </div>
      <video id="videoPlayer" controls poster="https://images.unsplash.com/photo-1464983953574-0892a716854b?auto=format&fit=crop&w=800&q=80" preload="metadata" autoplay muted>
        Tu navegador no soporta la reproducción de video.
      </video>
      <div class="autoplay-msg" id="autoplayMsg" style="display:none;">
        🔊 El video se reproduce en silencio por políticas del navegador.<br>
        Haz clic en el video para activar el sonido.
      </div>
      <div class="error" id="errorMsg"></div>
    </div>
  </main>
  <script>
    const fileInput = document.getElementById('fileInput');
    const playUrlBtn = document.getElementById('playUrlBtn');
    const videoPlayer = document.getElementById('videoPlayer');
    const errorMsg = document.getElementById('errorMsg');
    const toggleThemeBtn = document.getElementById('toggleThemeBtn');
    const themeIcon = document.querySelector('.theme-icon');
    const autoplayMsg = document.getElementById('autoplayMsg');

    // Guardar preferencia de tema
    let night = localStorage.getItem('nightMode') === 'true';
    if (night) {
      document.body.classList.add('night');
      themeIcon.textContent = '☀️';
    }
    toggleThemeBtn.addEventListener('click', () => {
      night = !night;
      document.body.classList.toggle('night', night);
      themeIcon.textContent = night ? '☀️' : '🌙';
      localStorage.setItem('nightMode', night);
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        videoPlayer.src = url;
        videoPlayer.poster = '';
        errorMsg.textContent = '';
        videoPlayer.muted = true;
        videoPlayer.autoplay = true;
        videoPlayer.play();
        autoplayMsg.style.display = 'block';
      }
    });

    playUrlBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url) {
        errorMsg.textContent = 'Por favor ingresa un enlace de video.';
        return;
      }
      if (!/^https?:\/\/.+\.(mp4|webm|ogg)(\?.*)?$/i.test(url)) {
        errorMsg.textContent = 'El enlace debe ser directo a un archivo de video (.mp4, .webm, .ogg).';
        return;
      }
      videoPlayer.src = url;
      videoPlayer.poster = '';
      errorMsg.textContent = '';
      videoPlayer.play();
    });

    videoPlayer.addEventListener('volumechange', () => {
      if (!videoPlayer.muted && videoPlayer.volume > 0) {
        autoplayMsg.style.display = 'none';
      }
    });

    videoPlayer.addEventListener('click', () => {
      if (videoPlayer.muted) {
        videoPlayer.muted = false;
        autoplayMsg.style.display = 'none';
      }
    });

    // Atajo: barra espaciadora para pausar/reanudar
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement !== urlInput) {
        e.preventDefault();
        if (videoPlayer.paused) videoPlayer.play();
        else videoPlayer.pause();
      }
    });

    // Doble click en video: pantalla completa
    videoPlayer.addEventListener('dblclick', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        videoPlayer.requestFullscreen();
      }
    });
  </script>
</body>
</html>
